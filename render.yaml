services:
  - type: web
    name: m-zzang
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/db.json
    disk:
      name: m-zzang-data
      mountPath: /var/data
      sizeGB: 1
